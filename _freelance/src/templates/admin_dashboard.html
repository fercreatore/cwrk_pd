<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H4 - Dashboard Gerencial Freelance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #f0f2f5; color: #1a1a2e; }

        .header { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
                  color: white; padding: 20px 24px; }
        .header h1 { font-size: 22px; }
        .header p { font-size: 13px; opacity: 0.7; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                   gap: 16px; margin-bottom: 24px; }
        .kpi { background: white; border-radius: 12px; padding: 20px;
               box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .kpi.big { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); color: white; }
        .kpi-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; }
        .kpi-val { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .kpi-sub { font-size: 12px; opacity: 0.5; margin-top: 4px; }

        .section { background: white; border-radius: 12px; padding: 20px;
                   box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .section h2 { font-size: 16px; margin-bottom: 16px; color: #333; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 8px; border-bottom: 2px solid #eee; color: #666;
             font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 8px; border-bottom: 1px solid #f5f5f5; }
        tr:hover td { background: #f8f9fa; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        .canal-bar { display: flex; height: 32px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .canal-seg { display: flex; align-items: center; justify-content: center;
                     font-size: 11px; font-weight: 600; color: white; min-width: 60px; }

        .alert-badge { display: inline-block; padding: 3px 8px; border-radius: 4px;
                       font-size: 11px; font-weight: 600; }
        .alert-badge.danger { background: #fce4ec; color: #c62828; }
        .alert-badge.warn { background: #fff3e0; color: #e65100; }

        .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px;
               font-weight: 600; cursor: pointer; }
        .btn-primary { background: #0f3460; color: white; }
        .btn-outline { background: white; color: #0f3460; border: 1px solid #0f3460; }
        .actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard Gerencial — Red Freelance</h1>
        <p id="periodo">Cargando...</p>
    </div>

    <div class="container">
        <div class="actions">
            <button class="btn btn-primary" onclick="syncVentas()">Sincronizar ventas</button>
            <button class="btn btn-primary" onclick="generarLiquidaciones()">Generar liquidaciones</button>
            <button class="btn btn-outline" onclick="window.location.href='/docs'">API Docs</button>
        </div>

        <div class="kpi-row" id="kpis">
            <div class="kpi"><div class="kpi-label">Cargando...</div></div>
        </div>

        <div class="section" id="canales-section">
            <h2>Ventas por canal</h2>
            <div id="canales">Cargando...</div>
        </div>

        <div class="section">
            <h2>Ahorro vs modelo empleado</h2>
            <div id="ahorro">Cargando...</div>
        </div>

        <div class="section" id="alertas-section" style="display:none">
            <h2>Alertas monotributo</h2>
            <div id="alertas"></div>
        </div>

        <div class="section">
            <h2>Liquidaciones del mes</h2>
            <div id="liquidaciones">Cargando...</div>
        </div>
    </div>

    <script>
    const fmt = (n) => new Intl.NumberFormat('es-AR', {maximumFractionDigits: 0}).format(n);
    const COLORS = {INSTAGRAM:'#E4405F', WHATSAPP:'#25D366', PRESENCIAL:'#0f3460', ML:'#FFE600', WEB:'#333', TIKTOK:'#000'};

    async function loadDashboard() {
        const res = await fetch('/api/v1/gerencial/dashboard');
        const d = await res.json();
        document.getElementById('periodo').textContent = d.periodo;

        document.getElementById('kpis').innerHTML = `
            <div class="kpi big">
                <div class="kpi-label">Venta total (producto)</div>
                <div class="kpi-val">$${fmt(d.ventas.total_producto)}</div>
                <div class="kpi-sub">${d.ventas.operaciones} operaciones · ${d.ventas.pares} pares</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Fees generados</div>
                <div class="kpi-val">$${fmt(d.ventas.total_fee)}</div>
                <div class="kpi-sub">Ingreso de los vendedores</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">Vendedores activos</div>
                <div class="kpi-val">${d.red.vendedores_con_ventas} / ${d.red.vendedores_registrados}</div>
                <div class="kpi-sub">Con ventas / registrados</div>
            </div>
        `;

        // Canales
        if (d.canales.length > 0) {
            const total = d.canales.reduce((s,c) => s + (c.monto||0), 0);
            let barHtml = '<div class="canal-bar">';
            let detHtml = '<table><tr><th>Canal</th><th class="num">Operaciones</th><th class="num">Monto</th><th class="num">%</th></tr>';
            for (const c of d.canales) {
                const pct = total > 0 ? (c.monto/total*100) : 0;
                const color = COLORS[c.canal] || '#999';
                barHtml += `<div class="canal-seg" style="width:${Math.max(pct,5)}%;background:${color}">${c.canal}</div>`;
                detHtml += `<tr><td>${c.canal}</td><td class="num">${c.operaciones}</td><td class="num">$${fmt(c.monto)}</td><td class="num">${pct.toFixed(1)}%</td></tr>`;
            }
            barHtml += '</div>';
            detHtml += '</table>';
            document.getElementById('canales').innerHTML = barHtml + detHtml;
        }

        // Alertas
        if (d.alertas_monotributo.length > 0) {
            document.getElementById('alertas-section').style.display = 'block';
            let html = '';
            for (const a of d.alertas_monotributo) {
                html += `<div style="padding:8px 0;border-bottom:1px solid #eee">
                    <span class="alert-badge ${a.tipo==='PELIGRO'?'danger':'warn'}">${a.tipo}</span>
                    <strong>${a.vendedor}</strong> ${a.nombre} — Cat ${a.categoria} al ${a.pct_tope}% del tope
                </div>`;
            }
            document.getElementById('alertas').innerHTML = html;
        }
    }

    async function loadAhorro() {
        const res = await fetch('/api/v1/gerencial/ahorro');
        const d = await res.json();
        document.getElementById('ahorro').innerHTML = `
            <div class="kpi-row" style="margin-bottom:0">
                <div class="kpi big">
                    <div class="kpi-label">Ahorro total vs empleados</div>
                    <div class="kpi-val">$${fmt(d.totales.costo_modelo_empleado)}/mes</div>
                    <div class="kpi-sub">Costo laboral que desaparece completamente</div>
                </div>
                <div class="kpi">
                    <div class="kpi-label">Mejora neto vendedores</div>
                    <div class="kpi-val">$${fmt(d.totales.mejora_neto_vendedores)}</div>
                    <div class="kpi-sub">Extra que ganan los vendedores</div>
                </div>
            </div>
            <p style="font-size:13px;color:#666;margin-top:12px;padding:8px;background:#f8f9fa;border-radius:8px">
                ${d.nota}
            </p>
        `;
    }

    async function loadLiquidaciones() {
        const res = await fetch('/api/v1/liquidacion/resumen');
        const d = await res.json();
        if (!d.liquidaciones || d.liquidaciones.length === 0) {
            document.getElementById('liquidaciones').innerHTML = '<p style="color:#999">No hay liquidaciones. Presiona "Generar liquidaciones".</p>';
            return;
        }
        let html = `<table>
            <tr><th>Vendedor</th><th class="num">Ventas</th><th class="num">Fee</th><th class="num">Mono</th><th class="num">Neto</th><th>Estado</th></tr>`;
        for (const l of d.liquidaciones) {
            html += `<tr>
                <td><strong>${l.vendedor}</strong> ${l.nombre}</td>
                <td class="num">$${fmt(l.ventas_producto)}</td>
                <td class="num">$${fmt(l.fee_total)}</td>
                <td class="num">$${fmt(l.mono)}</td>
                <td class="num"><strong>$${fmt(l.neto)}</strong></td>
                <td>${l.estado}</td>
            </tr>`;
        }
        html += '</table>';
        document.getElementById('liquidaciones').innerHTML = html;
    }

    async function syncVentas() {
        const res = await fetch('/api/v1/atribucion/sync_viajante', {method:'POST'});
        const d = await res.json();
        alert('Sincronizadas: ' + d.sincronizadas + ' ventas nuevas');
        loadDashboard();
    }

    async function generarLiquidaciones() {
        const res = await fetch('/api/v1/liquidacion/generar', {method:'POST'});
        const d = await res.json();
        alert('Generadas: ' + d.generadas + ' liquidaciones');
        loadLiquidaciones();
    }

    loadDashboard();
    loadAhorro();
    loadLiquidaciones();
    </script>
</body>
</html>
