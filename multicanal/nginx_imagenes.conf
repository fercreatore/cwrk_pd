# Nginx config para servir imágenes del catálogo como archivos estáticos.
#
# INSTALAR en el VPS (200.58.109.125):
#   sudo cp nginx_imagenes.conf /etc/nginx/sites-available/imagenes
#   sudo ln -sf /etc/nginx/sites-available/imagenes /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Después las fotos quedan accesibles en:
#   https://calzalindo.com.ar/img/2/2722200048/2722200048-01.jpeg
#
# O si no hay dominio apuntando al VPS:
#   http://200.58.109.125:8088/img/2/2722200048/2722200048-01.jpeg

server {
    listen 8088;
    server_name calzalindo.com.ar 200.58.109.125;

    # Servir imágenes del catálogo
    location /img/ {
        alias /var/www/imagenes/;

        # Cache agresivo — las fotos de productos no cambian seguido
        expires 30d;
        add_header Cache-Control "public, immutable";

        # CORS para que TN/ML puedan fetchear las imágenes
        add_header Access-Control-Allow-Origin "*";

        # Solo servir imágenes
        types {
            image/jpeg  jpeg jpg;
            image/png   png;
            image/webp  webp;
            image/gif   gif;
        }
        default_type application/octet-stream;

        # Limitar tamaño de request (solo GET)
        limit_except GET {
            deny all;
        }
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Bloquear todo lo demás
    location / {
        return 404;
    }
}
