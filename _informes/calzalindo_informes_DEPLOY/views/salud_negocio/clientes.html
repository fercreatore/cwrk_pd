{{extend 'layout.html'}}
{{response.title = 'Clientes'}}
<!--
  Vista: views/salud_negocio/clientes.html
  Controller: salud_negocio.py -> clientes()
-->
<link href="https://unpkg.com/tabulator-tables@5.5.4/dist/css/tabulator_bootstrap4.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.4/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* === KPI CARDS === */
.kpi-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.kpi-card {
    flex: 1; min-width: 180px; background: #fff; border-radius: 8px;
    padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); text-align: center;
    border-top: 3px solid #007bff;
}
.kpi-card h5 { margin: 0 0 5px; font-size: 12px; color: #888; text-transform: uppercase; }
.kpi-card .valor { font-size: 24px; font-weight: bold; color: #333; }
.kpi-card .sub { font-size: 11px; color: #999; margin-top: 3px; }
.kpi-card.verde { border-top-color: #28a745; }
.kpi-card.rojo { border-top-color: #dc3545; }
.kpi-card.naranja { border-top-color: #fd7e14; }
.kpi-card.azul { border-top-color: #007bff; }
/* === SUB-NAV === */
.sub-nav { display: flex; gap: 5px; margin-bottom: 20px; }
.sub-nav a {
    padding: 8px 16px; border-radius: 6px; text-decoration: none;
    background: #e9ecef; color: #495057; font-size: 13px;
}
.sub-nav a.active { background: #343a40; color: #fff; font-weight: bold; }
.sub-nav a:hover:not(.active) { background: #dee2e6; }
/* === CHART === */
.chart-container {
    background: #fff; border-radius: 8px; padding: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08); margin-bottom: 20px;
    position: relative; height: 400px;
}
</style>

<div class="container-fluid" style="padding: 20px;">
    <!-- TITULO -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin:0;">
            <i class="glyphicon glyphicon-user"></i>
            Analisis de Clientes
        </h3>
    </div>

    <!-- SUB-NAV -->
    <div class="sub-nav">
        <a href="{{=URL('salud_negocio', 'dashboard')}}">Dashboard</a>
        <a href="{{=URL('salud_negocio', 'clientes')}}" class="active">Clientes</a>
        <a href="{{=URL('salud_negocio', 'sucursales')}}">Sucursales</a>
    </div>

    <!-- KPIs -->
    <div class="kpi-row">
        <div class="kpi-card {{='verde' if retencion_pct >= 30 else 'naranja' if retencion_pct >= 15 else 'rojo'}}">
            <h5>Retencion Mensual</h5>
            <div class="valor">{{=retencion_pct}}%</div>
            <div class="sub">Clientes mes anterior que repiten este mes</div>
        </div>
    </div>

    <!-- CHART -->
    <h4 style="margin-bottom: 10px;">Clientes Unicos Mensuales - Comparativa Anual</h4>
    <div class="chart-container">
        <canvas id="clientesTrendChart"></canvas>
    </div>

    <!-- TABLE -->
    <h4 style="margin-bottom: 10px;">Clientes por Sucursal (Ultimos 12 meses)</h4>
    <div id="tabla-clientes-suc" style="margin-bottom: 30px;"></div>
</div>

<script>
(function() {
    function fmtPesos(n) {
        if (n == null || isNaN(n)) return '$0';
        var neg = n < 0;
        n = Math.abs(n);
        var parts = n.toFixed(0).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        return (neg ? '-' : '') + '$' + parts.join(',');
    }

    var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    // =============================
    // TREND CHART
    // =============================
    var trendData = JSON.parse('{{=XML(trend_json)}}');
    var byYear = {};
    for (var i = 0; i < trendData.length; i++) {
        var row = trendData[i];
        var yr = row.anio;
        if (!byYear[yr]) byYear[yr] = {};
        byYear[yr][row.mes] = row.clientes;
    }

    var colors = ['#6c757d', '#fd7e14', '#007bff', '#28a745'];
    var years = Object.keys(byYear).sort();
    var datasets = [];
    for (var yi = 0; yi < years.length; yi++) {
        var yr = years[yi];
        var vals = [];
        for (var m = 1; m <= 12; m++) {
            vals.push(byYear[yr][m] || null);
        }
        datasets.push({
            label: yr,
            data: vals,
            borderColor: colors[yi % colors.length],
            backgroundColor: 'transparent',
            tension: 0.3,
            borderWidth: yi === years.length - 1 ? 3 : 2,
            pointRadius: yi === years.length - 1 ? 4 : 2
        });
    }

    var ctx = document.getElementById('clientesTrendChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: { labels: meses, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + (context.raw != null ? context.raw.toLocaleString() : '0') + ' clientes';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(v) { return v.toLocaleString(); }
                    }
                }
            }
        }
    });

    // =============================
    // TABULATOR TABLE
    // =============================
    var porSuc = JSON.parse('{{=XML(por_suc_json)}}');

    new Tabulator('#tabla-clientes-suc', {
        data: porSuc,
        layout: 'fitColumns',
        pagination: 'local',
        paginationSize: 20,
        initialSort: [{ column: 'venta', dir: 'desc' }],
        columns: [
            { title: 'Local', field: 'sucursal', headerFilter: true, width: 120 },
            {
                title: 'Clientes', field: 'clientes', hozAlign: 'right',
                formatter: function(cell) { return cell.getValue() != null ? cell.getValue().toLocaleString() : '0'; }
            },
            {
                title: 'Venta', field: 'venta', hozAlign: 'right',
                formatter: function(cell) { return fmtPesos(cell.getValue()); },
                sorter: 'number'
            },
            {
                title: '% del Total', field: 'pct_total', hozAlign: 'right',
                formatter: function(cell) {
                    var v = cell.getValue();
                    return (v != null ? v.toFixed(1) : '0.0') + '%';
                },
                sorter: 'number'
            }
        ]
    });
})();
</script>
