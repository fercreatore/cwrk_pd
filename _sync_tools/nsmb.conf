# /etc/nsmb.conf — Config global SMB macOS
# Optimizado para Windows Server 2012 (192.168.2.111 y .112)

[default]
# Desactivar signing — Win2012 no lo requiere, duplica throughput
signing_required=no

# Desactivar notificaciones de cambio — causa #1 de "stuck sending"
notify_off=yes

# Desactivar DFS — no se usa, genera timeouts
dfs_disabled=yes

# Soft mount — operaciones devuelven error en vez de colgar infinito
soft=yes

# Desactivar cache de directorios — evita stale file handles post-reconexión
dir_cache_off=yes

# Forzar SMB2 (4) — evita bugs de SMB3 multichannel en macOS
protocol_vers_map=4

# Desactivar multichannel — con 1 NIC causa desconexiones al dormir
mc_on=no

# Streams NTFS
streams=yes
